{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="error-wrap">
    <div>
        <p class="error-code">404</p>
        <h1 class="error-title">This page doesn't exist.</h1>
        <p class="error-sub">The page you're looking for may have been moved or the URL might be incorrect.</p>
        <a href="{{ url_for('index') }}" class="back-link">&larr; Back to the application form</a>
    </div>
</div>
{% endblock %}
